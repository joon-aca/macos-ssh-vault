name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build release tarball
        run: |
          version="${GITHUB_REF_NAME}"
          staging="$(mktemp -d)"
          cp -r bin libexec scripts bootstrap README.md .gitignore "$staging/"
          tar -czf "macos-ssh-vault-${version}.tar.gz" -C "$staging" .
          rm -rf "$staging"
      - name: Create release
        run: gh release create "$GITHUB_REF_NAME" "macos-ssh-vault-${GITHUB_REF_NAME}.tar.gz"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
